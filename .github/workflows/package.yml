name: package

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: npm ci

      - name: Sync localharness runtimes
        run: npm run sync:localharness

      - run: npm run build

      - run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

  publish:
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: npm ci

      - name: Verify release tag matches package version
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tag = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          if (pkg.version !== tag) {
            console.error(`Release tag ${process.env.GITHUB_REF_NAME} does not match package.json version ${pkg.version}`);
            process.exit(1);
          }
          NODE

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
